name: golangci-lint
on:
  push:
  pull_request:
  schedule:
    - cron: '55 4 20 * *'

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          